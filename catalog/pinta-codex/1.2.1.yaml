schema_version: 1
id: pinta-codex
name: Pinta Codex
version: 1.2.1
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-codex/-/pinta-codex-1.2.1.tgz
  sha256: "feb909f10baf107af00689e8b5782b35fdb57082293ba150a7d8cefb1904f658"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: codex
targets:
  - client: codex
    install:
      type: codex-plugin
      dist_root: package/dist
      hooks_template: package/hooks.json
      env_file_keys:
        OTEL_EXPORTER_OTLP_ENDPOINT: relay-endpoint
        OTEL_EXPORTER_OTLP_HEADERS: relay-token
guard:
  evaluates: false
