schema_version: 1
id: pinta-codex
name: Pinta Codex
version: 1.2.3
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-codex/-/pinta-codex-1.2.3.tgz
  sha256: "42189b48f376a54ba296e3a2f718fe737e71267984e30e471bdef4a70c737a8f"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: codex
targets:
  - client: codex
    install:
      type: codex-plugin
      dist_root: package/dist
      hooks_template: package/hooks.json
      env_file_keys:
        OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: relay-endpoint
        OTEL_EXPORTER_OTLP_HEADERS: relay-token
guard:
  evaluates: true
