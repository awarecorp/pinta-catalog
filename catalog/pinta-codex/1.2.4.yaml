schema_version: 1
id: pinta-codex
name: Pinta Codex
version: 1.2.4
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-codex/-/pinta-codex-1.2.4.tgz
  sha256: "674e394163de88015d667268f4c879b38efc6131ccfe0e68d0f408c1558be838"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: codex
targets:
  - client: codex
    install:
      type: codex-plugin
      dist_root: package/dist
      hooks_template: package/hooks.json
      env_file_keys:
        OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: relay-endpoint
        OTEL_EXPORTER_OTLP_HEADERS: relay-token
guard:
  evaluates: true
