schema_version: 1
id: pinta-codex
name: Pinta Codex
version: 1.2.2
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-codex/-/pinta-codex-1.2.2.tgz
  sha256: "afafe244ac43b8edb2793f2c8adf15c97393768cf9e5140ab6a9315bf820f9b6"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: codex
targets:
  - client: codex
    install:
      type: codex-plugin
      dist_root: package/dist
      hooks_template: package/hooks.json
      env_file_keys:
        OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: relay-endpoint
        OTEL_EXPORTER_OTLP_HEADERS: relay-token
guard:
  evaluates: false
