schema_version: 1
id: pinta-cc
name: Pinta CC
version: 1.3.1
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-cc/-/pinta-cc-1.3.1.tgz
  sha256: "516be773420d818f2a47c0260cd2dcf6f0c068bba62ed0d0efee65a260145252"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: cc
targets:
  - client: claude-code-plugin
    install:
      type: claude-code-plugin
      plugin_slug: pinta-cc@pinta-ai
      plugin_root: package
      user_config:
        endpoint: relay-endpoint
        api_key: relay-token-raw
guard:
  evaluates: true
