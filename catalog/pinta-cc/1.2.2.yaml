schema_version: 1
id: pinta-cc
name: Pinta CC
version: 1.2.2
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-cc/-/pinta-cc-1.2.2.tgz
  sha256: "eb2bb7b711ab114e1a5ee827b55e278c60b379936b32ec91522e37fa36679321"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: cc
targets:
  - client: claude-code-plugin
    install:
      type: claude-code-plugin
      plugin_slug: pinta-cc@pinta-ai
      plugin_root: package
      user_config:
        endpoint: relay-endpoint
        api_key: relay-token-raw
guard:
  evaluates: true
