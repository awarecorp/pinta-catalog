schema_version: 1
id: pinta-cc
name: Pinta CC
version: 1.2.1
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-cc/-/pinta-cc-1.2.1.tgz
  sha256: "56bbb6a4ceb236064b588bbc4c5e034db234f4d87ba5368ee7ea56763effed41"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: cc
targets:
  - client: claude-code-plugin
    install:
      type: claude-code-plugin
      plugin_slug: pinta-cc@pinta-ai
      plugin_root: package
      user_config:
        endpoint: relay-endpoint
        api_key: relay-token-raw
guard:
  evaluates: false
