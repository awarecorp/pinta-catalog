schema_version: 1
id: pinta-cc
name: Pinta CC
version: 1.3.0
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-cc/-/pinta-cc-1.3.0.tgz
  sha256: "3ca85873fd57befb26807261d8dc153be0d57c464270b96f89f35dbbe5a941cc"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: cc
targets:
  - client: claude-code-plugin
    install:
      type: claude-code-plugin
      plugin_slug: pinta-cc@pinta-ai
      plugin_root: package
      user_config:
        endpoint: relay-endpoint
        api_key: relay-token-raw
guard:
  evaluates: true
