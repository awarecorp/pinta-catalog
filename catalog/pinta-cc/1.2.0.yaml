schema_version: 1
id: pinta-cc
name: Pinta CC
version: 1.2.0
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@pinta-ai/pinta-cc/-/pinta-cc-1.2.0.tgz
  sha256: "02fbaddca9dc9512b062b2c743ec7d5554b5d9953936bc42c70c268920aefe4e"
  entrypoint: package/dist/index.js
ingest:
  via: manager
  type: cc
targets:
  - client: claude-code-plugin
    install:
      type: claude-code-plugin
      plugin_slug: pinta-cc@manager
      plugin_root: package
      user_config:
        endpoint: relay-endpoint
        api_key: relay-token-raw
guard:
  evaluates: false
