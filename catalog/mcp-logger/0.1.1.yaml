schema_version: 1
id: mcp-logger
name: MCP Logger
version: 0.1.1
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@awarecorp/mcp-logger/-/mcp-logger-0.1.1.tgz
  sha256: "70214ab29eadd7132cebb96c2fefe6a9f0b6012ab167e63e601800dcbd6e8724"
  entrypoint: package/dist/cli/index.js
ingest:
  via: manager
  type: mcp
targets:
  - client: claude-desktop
    install:
      type: mcp-config-wrap
      detect:
        macos: ~/Library/Application Support/Claude/claude_desktop_config.json
        linux: ~/.config/Claude/claude_desktop_config.json
      wrap:
        extra_args: []
        env_keys:
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: relay-endpoint
          OTEL_EXPORTER_OTLP_HEADERS: relay-token
  - client: cursor
    install:
      type: mcp-config-wrap
      detect:
        macos: ~/.cursor/mcp.json
        linux: ~/.cursor/mcp.json
      wrap:
        extra_args: []
        env_keys:
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: relay-endpoint
          OTEL_EXPORTER_OTLP_HEADERS: relay-token
  - client: claude-code
    install:
      type: mcp-config-wrap
      detect:
        macos: ~/.claude.json
        linux: ~/.claude.json
      wrap:
        extra_args: []
        env_keys:
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: relay-endpoint
          OTEL_EXPORTER_OTLP_HEADERS: relay-token
guard:
  evaluates: false
