schema_version: 1
id: mcp-logger
name: MCP Logger
version: 0.1.1-dev.1
runtime: node
artifact:
  type: npm-tarball
  url: https://registry.npmjs.org/@awarecorp/mcp-logger/-/mcp-logger-0.1.1-dev.1.tgz
  sha256: "8185c012e91831c1ff0de34da9d6637b9385fb4e44eff07cca99fec7d8f7fa46"
  entrypoint: package/dist/cli/index.js
ingest:
  via: manager
  type: mcp
targets:
  - client: claude-desktop
    install:
      type: mcp-config-wrap
      detect:
        macos: ~/Library/Application Support/Claude/claude_desktop_config.json
        linux: ~/.config/Claude/claude_desktop_config.json
        windows: ~/AppData/Roaming/Claude/claude_desktop_config.json
      wrap:
        extra_args: []
        env_keys:
          OTEL_EXPORTER_OTLP_ENDPOINT: relay-endpoint
          OTEL_EXPORTER_OTLP_HEADERS: relay-token
  - client: cursor
    install:
      type: mcp-config-wrap
      detect:
        macos: ~/.cursor/mcp.json
        linux: ~/.cursor/mcp.json
        windows: ~/.cursor/mcp.json
      wrap:
        extra_args: []
        env_keys:
          OTEL_EXPORTER_OTLP_ENDPOINT: relay-endpoint
          OTEL_EXPORTER_OTLP_HEADERS: relay-token
  - client: claude-code
    install:
      type: mcp-config-wrap
      detect:
        macos: ~/.claude.json
        linux: ~/.claude.json
        windows: ~/.claude.json
      wrap:
        extra_args: []
        env_keys:
          OTEL_EXPORTER_OTLP_ENDPOINT: relay-endpoint
          OTEL_EXPORTER_OTLP_HEADERS: relay-token
guard:
  evaluates: false
